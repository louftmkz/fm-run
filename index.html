<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>FM RUN</title>
<meta name="theme-color" content="#0f1530" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FM RUN" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
</script>
<style>
  :root{
    --bg-0:#070b1a;
    --bg-1:#0f1530;
    --accent:#ffcc33;
    --accent-2:#ff4d8d;
    --money:#8cf0aa;        /* heller Spring-Green fuer Money-Glow + Shizzo-Verbindung */
    --money-soft:#8cf0aa80; /* halbtransparent fuer dezente Outlines */
    --ink:#e8ecff;
    --ink-dim:#8993b8;
    --danger:#ff5566;
    --pixel:'Press Start 2P',ui-monospace,'Courier New',monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg-0);color:var(--ink);font-family:var(--pixel);-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  /* Mobile-only Layout: auf Desktop wird das Spielfeld auf Phone-Aspect (max 430px) zentriert.
     Auf Mobile fuellt es weiterhin den ganzen Bildschirm. */
  body{background:#050714}
  #wrap{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,0.6)}
  #gamearea{flex:1;position:relative;min-height:0;overflow:hidden}
  canvas{display:block;width:100%;height:100%;background:linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 70%)}
  .ui{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column}
  /* Bottom-Nav: Charakter-Buttons + Pause/Play darunter mittig.
     Hoehe = content-based via flex:0 0 auto -> waechst genau soviel wie Inhalt braucht. */
  .charnav{display:flex;flex-direction:column;flex:0 0 auto;padding:10px 10px max(10px,env(safe-area-inset-bottom)) 10px;gap:10px;background:linear-gradient(0deg,rgba(0,0,0,0.55),rgba(0,0,0,0.15));border-top:1px solid rgba(255,255,255,0.06)}
  .charrow{display:flex;gap:8px}
  .charslot{flex:1;display:flex;flex-direction:column;gap:4px;align-items:stretch;min-width:0}
  .charbtn{height:80px;border-radius:6px;border:2px solid rgba(255,255,255,0.22);background:transparent;cursor:pointer;transition:border-color .12s ease,transform .12s ease,box-shadow .12s ease;display:block;position:relative;padding:0;overflow:hidden}
  .charbtn img{image-rendering:pixelated;image-rendering:crisp-edges;display:block;pointer-events:none;position:absolute}
  .charbtn .face{width:50px;height:50px;top:50%;left:50%;transform:translate(-50%,-50%)}
  .charbtn .icon{width:16px;height:16px;bottom:7px;right:7px}
  .charname{height:14px;line-height:14px;text-align:center;font-family:var(--pixel);font-size:9px;color:rgba(255,255,255,0.55);text-shadow:0 1px 0 rgba(0,0,0,0.7);letter-spacing:.5px;transition:color .12s ease,text-shadow .12s ease;overflow:hidden;white-space:nowrap}
  .charbtn.active + .charname{color:#fff;text-shadow:0 1px 0 rgba(0,0,0,0.7),0 0 10px var(--accent)}
  .charbtn:active{transform:scale(.95)}
  .charbtn.active{border-color:var(--accent);transform:scale(1.04);box-shadow:0 0 18px rgba(255,204,51,0.65),inset 0 0 0 1px rgba(255,204,51,0.45)}
  /* Shizzo = der Money-Sammler -> gruene Outline (default + active glow), visuelle Verbindung zu den Money-Sprites */
  .charbtn[data-char="shizzo"]{border-color:rgba(140,240,170,0.45)}
  .charbtn[data-char="shizzo"].active{border-color:var(--money);box-shadow:0 0 18px rgba(140,240,170,0.75),inset 0 0 0 1px rgba(140,240,170,0.55)}
  .charbtn[data-char="shizzo"].active + .charname{color:#fff;text-shadow:0 1px 0 rgba(0,0,0,0.7),0 0 10px var(--money)}
  /* Pause/Play -- ICON ONLY, mittig unterhalb der Namen. Wird im Game-Over/Ready via .hidden ausgeblendet. */
  .controlrow{display:flex;justify-content:center;align-items:center;height:28px;flex:0 0 auto}
  .ctrlbtn{pointer-events:auto;width:34px;height:28px;border:0;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:transform .12s ease,filter .12s ease}
  .ctrlbtn img{image-rendering:pixelated;image-rendering:crisp-edges;width:22px;height:22px;display:block;pointer-events:none}
  .ctrlbtn:active{transform:scale(.88)}
  .ctrlbtn.paused img{filter:drop-shadow(0 0 6px rgba(255,204,51,0.85))}
  .top{display:flex;justify-content:space-between;align-items:flex-start;padding:max(14px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) 14px max(18px,env(safe-area-inset-left));letter-spacing:.5px;gap:12px}
  .charnav{padding-bottom:max(12px,env(safe-area-inset-bottom))}
  .scoreCol{display:flex;flex-direction:column;gap:4px;flex:1;text-align:left}
  .score{font-variant-numeric:tabular-nums;font-size:14px;line-height:1;color:var(--ink)}
  .best{font-variant-numeric:tabular-nums;font-size:7px;line-height:1;color:var(--ink-dim);letter-spacing:.5px}
  .coins{display:flex;align-items:center;gap:8px;font-variant-numeric:tabular-nums;font-size:14px;flex:1;justify-content:center}
  .coin-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(255,204,51,0.5)}
  .lives{display:flex;align-items:center;gap:5px;flex:1;justify-content:flex-end}
  .heart{width:22px;height:22px;background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff5566"><path d="M12 21s-7-4.5-7-11a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 6.5-7 11-7 11z"/></svg>') center/contain no-repeat;opacity:.22;transition:opacity .25s ease,transform .25s ease}
  .heart.full{opacity:1;transform:scale(1.05)}
  /* Life-loss feedback: Lives-Container schuettelt 5x in ~400ms */
  @keyframes lifeShake{
    0%,100%{transform:translateX(0)}
    10%,30%,50%,70%,90%{transform:translateX(-4px)}
    20%,40%,60%,80%{transform:translateX(4px)}
  }
  .lives.shake{animation:lifeShake .4s ease-in-out}
  .center{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:0 24px}
  .title{font-family:var(--pixel);font-size:36px;letter-spacing:2px;line-height:1.15;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 14px}
  .sub{color:var(--ink-dim);margin:0 0 28px;font-size:9px;line-height:1.6}
  .btn{pointer-events:auto;border:0;border-radius:8px;padding:14px 22px;font-family:var(--pixel);font-size:12px;letter-spacing:1px;background:var(--accent);color:#1a1a1a;cursor:pointer;box-shadow:0 8px 24px rgba(255,204,51,.25);transition:transform .08s ease}
  .btn:active{transform:scale(.96)}
  .hint{color:var(--ink-dim);margin-top:14px;font-size:8px;line-height:1.6}
  .hidden{display:none !important}
  .gameover .title{background:linear-gradient(90deg,var(--danger),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--ink-dim);font-size:8px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>
<div id="wrap">
  <div id="gamearea">
    <canvas id="game"></canvas>

    <div class="ui">
      <div class="top">
        <div class="scoreCol">
          <div class="score" id="score">0 m</div>
          <div class="best" id="best">Best 0 m</div>
        </div>
        <div class="coins" id="coins">
          <span class="coin-dot"></span>
          <span id="coinsValue">0</span>
        </div>
        <div class="lives" id="lives">
          <span class="heart"></span>
          <span class="heart"></span>
          <span class="heart"></span>
        </div>
      </div>

      <div class="center" id="screenStart">
        <h1 class="title">FM RUN</h1>
        <p class="sub">Tippe einen Helden<br>unten zum Wechseln</p>
        <button class="btn" id="btnStart">Spielen</button>
        <div class="hint">v0.2 prototype</div>
      </div>

      <div class="center hidden gameover" id="screenOver">
        <h1 class="title">GAME<br>OVER</h1>
        <p class="sub" id="overText">0 m</p>
        <button class="btn" id="btnRestart">Nochmal</button>
        <div class="hint">Tap zum<br>Neustart</div>
      </div>
    </div>
  </div>

  <div class="charnav">
    <div class="charrow">
      <div class="charslot">
        <button class="charbtn active" data-char="lou" style="--char-color:#ffd95c" aria-label="Lou">
          <img class="face" src="./sprites/button-lou.png" alt="" width="50" height="50" fetchpriority="high" decoding="sync">
          <img class="icon" src="./sprites/icon-lou.png?v=2" alt="" width="16" height="16" fetchpriority="high" decoding="sync">
        </button>
        <div class="charname">Lou</div>
      </div>
      <div class="charslot">
        <button class="charbtn" data-char="sasch" style="--char-color:#86efac" aria-label="Sasch">
          <img class="face" src="./sprites/button-sasch.png" alt="" width="50" height="50" fetchpriority="high" decoding="sync">
          <img class="icon" src="./sprites/icon-sasch.png?v=2" alt="" width="16" height="16" fetchpriority="high" decoding="sync">
        </button>
        <div class="charname">Sasch</div>
      </div>
      <div class="charslot">
        <button class="charbtn" data-char="shizzo" style="--char-color:#fca5a5" aria-label="Shizzo">
          <img class="face" src="./sprites/button-shizzo.png" alt="" width="50" height="50" fetchpriority="high" decoding="sync">
          <img class="icon" src="./sprites/icon-shizzo.png?v=2" alt="" width="16" height="16" fetchpriority="high" decoding="sync">
        </button>
        <div class="charname">Shizzo</div>
      </div>
      <div class="charslot">
        <button class="charbtn" data-char="long" style="--char-color:#93c5fd" aria-label="LonG">
          <img class="face" src="./sprites/button-long.png" alt="" width="50" height="50" fetchpriority="high" decoding="sync">
          <img class="icon" src="./sprites/icon-long.png?v=2" alt="" width="16" height="16" fetchpriority="high" decoding="sync">
        </button>
        <div class="charname">LonG</div>
      </div>
    </div>
    <div class="controlrow hidden" id="controlRow">
      <button class="ctrlbtn" id="btnPause" aria-label="Pause">
        <img id="pauseIcon" src="./sprites/pause.png" alt="" width="22" height="22">
      </button>
    </div>
  </div>
</div>

<script>
(() => {
  // ---------- canvas / DPR ----------
  const canvas = document.getElementById('game');
  const gamearea = document.getElementById('gamearea');
  const ctx = canvas.getContext('2d');
  // Pixel-Perfect: keine bilineare Interpolation beim drawImage -> Sprites bleiben knackig
  ctx.imageSmoothingEnabled = false;
  let DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  let W = 0, H = 0;       // CSS pixels (Game-Area, ohne Bottom-Nav)
  function resize(){
    DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    // Bottom-Nav nimmt sich ihren Platz ueber flex; gamearea hat dann den Rest
    W = gamearea.clientWidth  || window.innerWidth;
    H = gamearea.clientHeight || (window.innerHeight - 100);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    // Smoothing-Flag nach Context-Reset erneut setzen (manche Browser resetten es)
    ctx.imageSmoothingEnabled = false;
    // Layout-Shift-Schutz (iOS Safari Adressleiste etc.): Player snappt auf neuen Boden,
    // damit er bei verkleinertem Viewport nicht unter der gelben Linie stehenbleibt.
    try {
      if(player.onGround && state !== STATE.SLIDING && state !== STATE.FALLING){
        player.y = groundY() - player.h;
        if(state === STATE.READY || state === STATE.OVER){
          player.x = Math.max(45, W * 0.10);
        }
      }
    } catch(e){ /* erst-Initialisierung */ }
  }
  window.addEventListener('resize', resize, {passive:true});
  resize();

  // ---------- state ----------
  const STATE = { READY:'ready', PLAYING:'playing', SLIDING:'sliding', FALLING:'falling', OVER:'over' };
  let state = STATE.READY;
  let lastT = 0;
  let timeAlive = 0;
  let distance = 0;          // in meters (score)
  let speed = 0;             // px/sec horizontal world speed
  // Speed pro Etage (Index = Level 0..MAX_LEVEL)
  // Hoehere Etage = schnellere Welt -> mehr Risk/Reward
  const SPEEDS = [260, 235, 180, 195, 210, 235, 260, 300]; // Code Level 0..7 = Ebene -1, 0, 1, 2, 3, 4, 5, 6
  const SPEED_LERP = 3;      // 1/SPEED_LERP = ~Sekunden bis neue Etagen-Speed erreicht
  const PIXELS_PER_METER = 30;

  // Spawn-Raten in "Events pro 100m" pro Etage (Index = Level 0..MAX_LEVEL)
  // Levels 1-4 nutzen identische Werte (= Level 4 als Baseline = "vorletzte Ebene"-Feel).
  // Level 0 (Ebene 1) bleibt sanfter fuer Einstieg, Level 5 (Ebene 6) hat eigenes Pattern.
  // Schwierigkeitsgrad ueber Geschwindigkeit, nicht ueber Spawn-Dichte.
  // Code Level 0..7 = Ebene -1, 0, 1 (Start), 2, 3, 4, 5, 6
  const SPAWN_RATES = {
    coin:     [ 45,  45,  80,  45,  45,  45,  45,   80],
    obstacle: [350, 350, 150, 350, 350, 350, 350,  500],
    gap:      [350, 350, 150, 350, 350, 350, 350,  500],
    ramp:     [ 45,  45, 140,  45,  45,  45,  45,    0]
  };

  // Combo-spezifischer Mindest-Abstand zwischen aufeinanderfolgenden Spawns auf gleicher Etage.
  // Format: SPAWN_MIN_GAP[letzterTyp][neuerTyp] = Pixel.
  // Verhindert Game-Over-Combos wie "Loch -> Hindernis" und chaotisches Cluster-Spawning.
  const SPAWN_MIN_GAP = {
    obstacle: { obstacle: 250, gap: 220, ramp: 180, coin: 50 },
    gap:      { obstacle: 300, gap: 350, ramp: 250, coin: 50 },
    ramp:     { obstacle: 220, gap: 280, ramp: 150, coin: 50 },
    coin:     { obstacle:  60, gap:  60, ramp:  60, coin: 35 }
  };
  const SPAWN_BUFFER_DEFAULT = 50; // wenn die Etage komplett leer ist

  // Schedule-basiertes Spawning (Varianz-Reduktion):
  // Statt reiner Bernoulli pro Frame tracken wir pro Typ/Etage die naechste Spawn-Distanz.
  // Intervall = 10000/rate (Meter), mit Jitter 0.7-1.3 × Mean. Bounded -> kein 500m-leer-Pech.
  const nextSpawnDistance = {
    coin:     [],
    obstacle: [],
    gap:      [],
    ramp:     []
  };
  function computeNextDist(type, lvl, fromDist, isInitial){
    const rate = SPAWN_RATES[type][lvl];
    if(!rate || rate <= 0) return Infinity;
    const interval = 10000 / rate;
    if(isInitial){
      // Initial: erste Spawns frueh, damit die Welt direkt populiert ist
      return fromDist + interval * (0.2 + 0.5 * Math.random());
    }
    // Steady-state: Jitter 0.7-1.3 × Mean
    return fromDist + interval * (0.7 + 0.6 * Math.random());
  }
  function resetSpawnSchedule(){
    for(const type of ['coin', 'obstacle', 'gap', 'ramp']){
      nextSpawnDistance[type] = [];
      for(let lvl = 0; lvl <= MAX_LEVEL; lvl++){
        nextSpawnDistance[type][lvl] = computeNextDist(type, lvl, 0, true);
      }
    }
  }

  // Etagen / Treppen-System
  const MAX_LEVEL = 7;          // 2 Underground (Code 0,1) + Start (Code 2 = Ebene 1) + 5 Etagen darueber
  const SLIDE_DURATION = 0.45;  // Sekunden pro Treppen-Aufstieg
  const FALL_DURATION  = 0.30;  // Sekunden pro Etagen-Sturz (Level > 0)
  let currentLevel = 2;         // aktuelle Etage des Spielers (Start = Code Level 2 = Ebene 1 Training Room)
  let levelEnterDistance = 0;   // Distanz-Marke beim Betreten der aktuellen Ebene
  let forceFallScheduled = false; // pro Visit: 1x Force-Fall (Gap/Ramp) bei 350m
  const FORCE_FALL_DISTANCE = 200; // Meter auf einer Ebene bis Force-Fall ausgeloest wird
  let slideProgress = 0;        // [-1..0..1] waehrend SLIDING/FALLING
  let activeRamp = null;        // Referenz auf die gerade befahrene Schraege (fuer geometrische Slide-Bindung)
  function levelGap(){ return H * 0.28; }
  function levelFloorY(k){
    // Bildschirm-Y der Etagen-Oberflaeche von Level k.
    // currentLevel sitzt immer auf H*0.65; waehrend SLIDING shifted die Welt nach unten.
    return H * 0.65 + slideProgress * levelGap() - (k - currentLevel) * levelGap();
  }

  let best = 0;
  try { best = parseInt(localStorage.getItem('fmrun_best') || '0', 10) || 0; } catch(e){}
  function updateBestDisplay(){
    const el = document.getElementById('best');
    if(el) el.textContent = 'Best ' + best.toLocaleString('de-DE') + ' m';
  }
  updateBestDisplay();

  // ---------- Lives / 1up ----------
  // 1ups spawnen nur als Teil des ramp_oneup Patterns auf Ebene 6.
  // Pro Visit auf Ebene 6 darf nur EIN 1up-Pattern spawnen -- danach blockiert,
  // bis der Spieler die Etage verlassen + wieder erreicht hat.
  const MAX_LIVES = 3;
  let lives = 0;                      // Spieler startet ohne Lives, sammelt sie durch 1ups
  // 1up-Logik v2: alle 1000m garantiert, abhaengig von der Ebene auf der man sich befindet.
  //   Spaceship (Code Level 7) -> ramp_oneup (Boost-Rampe Pattern)
  //   Ebenen 2-5 (Code Level 3-6) -> gap_air_oneup (1up ueber Loch, LonG-Apex)
  //   Underground/Gutter/Training (Code Level 0-2) -> kein 1up auf dieser Ebene, warten bis Aufstieg
  let nextOneUpAtDistance = 1000;
  let invincibleUntil = 0;            // Game-Time-Stempel: bis wann der Spieler unverwundbar ist (nach Life-Loss)
  function updateLivesDisplay(){
    const hearts = document.querySelectorAll('#lives .heart');
    hearts.forEach((h, i) => h.classList.toggle('full', i < lives));
  }
  updateLivesDisplay();

  // ---------- Life-Loss Feedback ----------
  // Branchen-Standard-Combo bei Life-Loss (wie Mario/Sonic/Mega Man):
  //  * Hit-Pause: 400ms Game-Freeze (update() skip) -- der Treffer wirkt wuchtig
  //  * Player-Blink: 5x sichtbar/unsichtbar waehrend Freeze
  //  * Screen-Flash: roter Vollbild-Overlay, der pulsiert + ausfadet
  //  * Heart-Shake: das Lives-UI schuettelt sich
  //  * Danach 1.5s Invincibility-Flicker wie bisher
  // Real-Time basiert (performance.now()) damit Animation auch waehrend Game-Freeze laeuft.
  let hitPauseRealUntil = 0;   // performance.now() Stempel: bis wann update() pausiert
  let hitFlashRealStart = 0;   // performance.now() Stempel: wann der Flash startet
  let hitFlashRealUntil = 0;   // performance.now() Stempel: wann der Flash endet
  function triggerLifeLossFeedback(){
    const now = performance.now();
    hitPauseRealUntil = now + 400;
    hitFlashRealStart = now;
    hitFlashRealUntil = now + 500;
    // Heart-Shake -- CSS-Klasse 400ms an, dann wieder ab
    const livesEl = document.getElementById('lives');
    livesEl.classList.remove('shake'); // reflow um Re-Trigger zu erlauben
    void livesEl.offsetWidth;
    livesEl.classList.add('shake');
    setTimeout(() => livesEl.classList.remove('shake'), 500);
  }
  function isHitPaused(){ return performance.now() < hitPauseRealUntil; }

  // ---------- Sprite-System (generisch, fuer Helden-Animationen) ----------
  // Wiederverwendbar fuer weitere Helden / Animations-States (jump, slide, idle).
  // Charakter haengt eine SpriteAnim-Instanz an seine Definition; im Render wird
  // bevorzugt das Sprite gezeichnet, sonst Fallback auf den Kreis/Body-Rect.
  class SpriteAnim {
    constructor({src, frames, frameW, frameH, fps, loop=true, freezeFrame=0}){
      this.frames = frames;
      this.frameW = frameW;
      this.frameH = frameH;
      this.fps = fps;
      this.loop = loop;
      this.freezeFrame = freezeFrame; // Frame der gezeigt wird wenn nicht "aktiv" (z.B. in der Luft)
      this.ready = false;
      this.img = new Image();
      this.img.onload = () => { this.ready = true; };
      this.img.onerror = () => { this.ready = false; };
      this.img.src = src;
    }
    frameAt(time, active=true){
      if(!active) return this.freezeFrame;
      const f = Math.floor(time * this.fps);
      return this.loop ? (((f % this.frames) + this.frames) % this.frames) : Math.min(Math.max(f,0), this.frames-1);
    }
    draw(ctx, time, dx, dy, dw, dh, active=true){
      if(!this.ready) return false;
      const idx = this.frameAt(time, active);
      // Pixel-Perfect: Destination-Koordinaten + -Groesse auf Integer snappen,
      // damit der Sprite nicht zwischen zwei Display-Pixeln rendert (Unschaerfe).
      const ix = Math.round(dx), iy = Math.round(dy);
      const iw = Math.round(dw), ih = Math.round(dh);
      ctx.drawImage(this.img, idx*this.frameW, 0, this.frameW, this.frameH, ix, iy, iw, ih);
      return true;
    }
  }

  const LOU_RUN = new SpriteAnim({
    src: './sprites/lou-run.png',
    frames: 8,
    frameW: 128,
    frameH: 128,
    fps: 12,
    loop: true,
    freezeFrame: 3 // mittlere Pose -> wirkt wie "in der Luft" wenn Lou nicht laeuft
  });

  const SASCH_RUN = new SpriteAnim({
  src: './sprites/sasch-run.png',
  frames: 8,
  frameW: 128,
  frameH: 128,
  fps: 12,
  loop: true,
  freezeFrame: 3
});

const SHIZZO_RUN = new SpriteAnim({
  src: './sprites/shizzo-run.png',
  frames: 8,

  // Tap / Space / Up startet/restart das Spiel im Menu/GameOver-Screen.

  // Sprunghoehe und Mindest-Air-Time fuer LonGs Auto-Jump
  const LONG_JUMP_HEIGHT  = 90;  // px (sichtbare Sprunghoehe, konstant -- niedrig genug damit Kopf nicht in obere Ebene ragt)
  const LONG_LAND_MARGIN  = 30;  // px hinter dem Loch zum Landen
  const LONG_MIN_AIR_TIME = 0.45;// kurze Loecher kriegen trotzdem einen sichtbaren Hop

  // Berechnet vy und custom Gravity so, dass der Spieler mit fester Hoehe (LONG_JUMP_HEIGHT)
  // und exakt der noetigen Air time landet -- knapp hinter dem Loch.
  // Physik: H = vy^2 / (2g),  T = 2|vy|/g  =>  g = 8H/T^2,  |vy| = sqrt(2gH)
  function triggerLongJump(gap){
    if(!player.onGround) return;
    const targetX = gap.x + gap.w + LONG_LAND_MARGIN;
    const required = (targetX - player.x) / speed;
    // Force-Gap: fest 0.8s Air-Time (sieht aus wie normaler Sprung) -- nicht lang genug
    // fuer 350px-Loecher -> LonG landet im Loch und faellt durch. Normale Loecher nutzen
    // weiterhin adaptive Air-Time fuer sicheres Landen.
    const tAir = gap.forced
      ? 0.8
      : Math.max(LONG_MIN_AIR_TIME, required);
    const g    = 8 * LONG_JUMP_HEIGHT / (tAir * tAir);
    const vy   = -Math.sqrt(2 * g * LONG_JUMP_HEIGHT);
    player.vy = vy;
    player.customGravity = g;
    player.onGround = false;
    player.jumpsUsed = 1;
    puff(player.x + player.w/2, player.y + player.h, 6);
  }

  // ---------- spawning ----------
  // Wahlt den Money-Kind fuer einen Spawn auf einer bestimmten Ebene.
  // Auf Underground (Code Level 0) zufaellig nach Rarity-Tabelle, sonst fix pro Ebene.
  // Wichtig: "3er coins" wird hier NICHT als kind ausgewaehlt -- das ist ein Multi-Spawn
  // und wird separat in spawnCoin (fuer Underground) bzw. via coin_chain Pattern realisiert.
  function pickMoneyKind(lvl){
    if(lvl === 0){
      // Underground: re-normalize ueber single/stack/bag/case/pot (ohne 3er, sum 80%)
      // Original: single 25, 3er 20, stack 18, bag 15, case 12, pot 10
      // Ohne 3er, normalized: 25/80=31.25, 18/80=22.5, 15/80=18.75, 12/80=15, 10/80=12.5
      const r = Math.random();
      if(r < 0.3125)      return 'coin';
      else if(r < 0.5375) return 'stack';
      else if(r < 0.7250) return 'bag';
      else if(r < 0.8750) return 'case';
      else                return 'pot';
    }
    return COIN_KIND_BY_LEVEL[lvl] || 'coin';
  }
  // Spawnt 3 Single-Coins in einer Reihe (selbe Ebene, ~25px Abstand).
  function spawnCoinChain(lvl){
    let x = W + 20;
    for(let i = 0; i < 3; i++){
      coins.push({ x, level: lvl, kind: 'coin' });
      x += 25;
    }
  }
  function spawnCoin(lvl){
    if(lvl === 0){
      // Underground: vollstaendige Rarity-Tabelle inkl. 3er-Folge (20%)
      const r = Math.random();
      if(r < 0.25)       { coins.push({ x: W + 20, level: 0, kind: 'coin'  }); }
      else if(r < 0.45)  { spawnCoinChain(0); }
      else if(r < 0.63)  { coins.push({ x: W + 20, level: 0, kind: 'stack' }); }
      else if(r < 0.78)  { coins.push({ x: W + 20, level: 0, kind: 'bag'   }); }
      else if(r < 0.90)  { coins.push({ x: W + 20, level: 0, kind: 'case'  }); }
      else               { coins.push({ x: W + 20, level: 0, kind: 'pot'   }); }
      return;
    }
    coins.push({ x: W + 20, level: lvl, kind: pickMoneyKind(lvl) });
  }
  // Cross-Level Konflikt-Checks: verhindert vertikal gestapelte Rampen/Luecken.
  // overlap = [x, x+w] eines neuen Spawns kollidiert mit Element der adjacenten Ebene.
  function hasOverlapOnLevel(arr, lvlMatch, x, w){
    for(const o of arr){
      if(lvlMatch(o.level) && o.x + o.w > x && o.x < x + w) return true;
    }
    return false;
  }
  function spawnGap(lvl){
    const w = 80 + Math.random()*50;
    const x = W + 20;
    // Skip wenn auf Ebene darunter (lvl-1) eine Rampe genau hier ist
    // -> sonst landet Lou nach Aufstieg in dem Loch.
    if(hasOverlapOnLevel(ramps, l => l === lvl - 1, x, w)) return;
    gaps.push({x, w, level: lvl});
    if(Math.random() < 0.20){
      // Air-Coin ueber der Luecke -- Kind nach Ebenen-Regel
      coins.push({ x: x + w/2, level: lvl, yOffset: 110, kind: pickMoneyKind(lvl) });
    }
  }
  function spawnRamp(lvl){
    const w = 110 + Math.random()*40;
    const x = W + 20;
    // Skip wenn auf der Ebene darunter (lvl-1) oder darueber (lvl+1) bereits eine Rampe ist
    // -> kein direktes Stapeln, sequentiell ist OK (verschiedene x-Positionen)
    if(hasOverlapOnLevel(ramps, l => l === lvl - 1 || l === lvl + 1, x, w)) return;
    // Skip wenn auf der Ebene darueber (lvl+1) ein Loch ist -> Lou wuerde reinfallen
    if(hasOverlapOnLevel(gaps,  l => l === lvl + 1, x, w)) return;
    ramps.push({x, w, level: lvl});
  }
  function spawnObstacle(lvl){
    const r = Math.random();
    if(r < 0.55){
      const w = 24 + Math.random()*22;
      const h = 28 + Math.random()*18;

      const w = 26;
      const h = 60 + Math.random()*20;
      obstacles.push({x: W + 20, w, h, type:'tall', level: lvl});
    } else {
      const w = 22, h = 32;
      obstacles.push({x: W + 20, w, h, type:'low', level: lvl});
      obstacles.push({x: W + 20 + w + 28, w, h, type:'low', level: lvl});
    }
  }

  // ---------- Patterns ----------
  // Scripted Spawn-Sequenzen, die mehrere Elemente eng platzieren -- Skill-Test fuer
  // Charakter-Wechsel. Format pro Op:
  //   type:    'obstacle' | 'gap' | 'ramp' | 'coin'
  //   dx:      Abstand zur RECHTEN KANTE des vorherigen Elements (Erste Op: zu W+20)
  //   lvlOff:  optional, Level-Offset relativ zu currentLevel (z.B. +1 fuer "Etage drueber")
  //   kind, w: optional, typ-spezifisch
  const PATTERNS = {
    // Sasch -> Shizzo -> Sasch
    coin_sandwich: [
      { type: 'obstacle', kind: 'low', dx:  0 },
      { type: 'coin',                  dx: 60 },
      { type: 'obstacle', kind: 'low', dx: 60 }
    ],
    // LonG -> Lou mid-air
    gap_ramp: [
      { type: 'gap',                   dx:   0, w: 100 },
      { type: 'ramp',                  dx: 100, w: 130 }
    ],
    // Sasch -> Lou
    obstacle_ramp: [
      { type: 'obstacle', kind: 'low', dx:  0 },
      { type: 'ramp',                  dx: 60,  w: 130 }
    ],
    // Sasch-only
    triple_obstacles: [
      { type: 'obstacle', kind: 'low', dx:  0 },
      { type: 'obstacle', kind: 'low', dx: 70 },
      { type: 'obstacle', kind: 'low', dx: 70 }
    ],
    // LonG -> Sasch mid-air -- frueher unmoeglich wegen Tap-Jump, jetzt drin
    gap_obstacle: [
      { type: 'gap',                   dx:  0, w: 100 },
      { type: 'obstacle', kind: 'low', dx: 80 }
    ],
    // Sasch -> LonG -> Sasch
    obstacle_gap_obstacle: [
      { type: 'obstacle', kind: 'low', dx:  0 },
      { type: 'gap',                   dx: 70,  w: 90 },
      { type: 'obstacle', kind: 'low', dx: 70 }
    ],
    // LonG -> Shizzo -> Sasch (Drei-Switch-Combo)
    gap_coin_obstacle: [
      { type: 'gap',                   dx:  0,  w: 100 },
      { type: 'coin',                  dx: 30 },
      { type: 'obstacle', kind: 'low', dx: 50 }
    ],
    // Shizzo run -- 3 Coins in Reihe
    coin_chain: [
      { type: 'coin',                  dx:  0 },
      { type: 'coin',                  dx: 25 },
      { type: 'coin',                  dx: 25 }
    ],
    // LonG-test: 3 Loecher mit Lande-Spacing fuer Auto-Jump
    triple_gaps: [
      { type: 'gap',                   dx:   0, w: 90 },
      { type: 'gap',                   dx: 180, w: 90 },
      { type: 'gap',                   dx: 180, w: 90 }
    ],
    // Lou -> LonG nach Aufstieg: Rampe auf Lvl k, Loch auf Lvl k+1 sequentiell danach
    ramp_gap: [
      { type: 'ramp',                  dx:   0, w: 130 },
      { type: 'gap',                   dx: 100, w: 100, lvlOff: 1 }
    ],
    // LonG springt ueber Loch, mid-air auf Shizzo wechseln um die Air-Coin zu greifen.
    // Coin schwebt mittig ueber dem Loch, auf Hoehe des LonG-Sprung-Apex.
    gap_aircoin: [
      { type: 'gap',  dx:   0, w: 100 },
      { type: 'coin', dx: -50,         dy: 110 }
    ],
    // ----- Ebene 6: Top-Level Rampen-Varianten -----
    // Auf MAX_LEVEL ist die Rampe ein Boost-Pad (Arc-Jump statt Slide).
    // dy = Schwebehoehe ueber Top-Floor (228px = "Etage 7"-Position),
    // dx Abstand zur Rampe damit der Spieler durch den Bogen "hineinfliegt".
    top_ramp_alone: [
      { type: 'ramp', dx:  0, w: 130 }
    ],
    top_ramp_coin: [
      { type: 'ramp', dx:  0, w: 130 },
      { type: 'coin', dx: 50, dy: 228 }
    ],
    top_arc_coins: [
      { type: 'ramp', dx:  0, w: 130 },
      { type: 'coin', dx: 30, dy: 228 },
      { type: 'coin', dx: 25, dy: 228 },
      { type: 'coin', dx: 25, dy: 228 }
    ],
    ramp_oneup: [
      { type: 'ramp',  dx:  0, w: 130 },
      { type: 'oneup', dx: 80,         dy: 228 }
    ],
    // gap_air_oneup: Loch + 1up in der Luft (LonG-Sprung-Apex). Nur via Force-Spawn auf Ebene 2-5.
    gap_air_oneup: [
      { type: 'gap',   dx:   0, w: 100 },
      { type: 'oneup', dx: -50,         dy: 110 }
    ]
  };

  // Pattern-Spawnrate pro Etage (Events pro 100m).
  // Levels 1-4 nutzen identische Werte (= Level 4 Baseline). Level 0 sanfter, Level 5 speziell.
  const PATTERN_RATES = {
    coin_sandwich:         [28, 28, 16, 28, 28, 28, 28,  0],
    gap_ramp:              [24, 24, 13, 24, 24, 24, 24,  0],
    obstacle_ramp:         [24, 24, 10, 24, 24, 24, 24,  0],
    triple_obstacles:      [24, 24,  8, 24, 24, 24, 24, 32],
    gap_obstacle:          [22, 22,  6, 22, 22, 22, 22, 28],
    obstacle_gap_obstacle: [18, 18,  4, 18, 18, 18, 18, 22],
    gap_coin_obstacle:     [20, 20,  5, 20, 20, 20, 20,  0],
    // 3er-Reihe coins: NUR noch auf Gutter & Ghetto (Code 1) + Night Club (Code 3).
    // Auf Underground (Code 0) ist die 3er-Folge in spawnCoin inline integriert (20% Rate).
    coin_chain:            [ 0, 18,  0, 18,  0,  0,  0,  0],
    triple_gaps:           [18, 18,  4, 18, 18, 18, 18, 25],
    ramp_gap:              [16, 16,  4, 16, 16, 16, 16,  0],
    // gap_aircoin: Loch mit Coin in der Luft daruber (nur via LonG-Apex erreichbar).
    // Belohnt mid-air Switch von LonG zu Shizzo. Auf allen Ebenen, sanfter auf Ebene 1.
    gap_aircoin:           [35, 35, 15, 35, 35, 35, 35, 35],
    // gap_air_oneup: wie gap_aircoin aber mit 1up statt Coin. NICHT random spawnen --
    // wird ausschliesslich von 1up-Force-Spawn (alle 1000m) auf Ebene 2-5 ausgeloest.
    gap_air_oneup:         [ 0,  0,  0,  0,  0,  0,  0,  0],
    // ----- Ebene-6-exklusive Rampen-Varianten mit 40/30/20/10 Verteilung -----
    // Total ~200 events/100m = ~1 Rampe alle 5s @ Top-Speed. Deutlich mehr Action.
    top_ramp_alone:        [ 0,  0,  0,  0,  0,  0,  0, 80], // 40% -- Rampe ohne Reward
    top_ramp_coin:         [ 0,  0,  0,  0,  0,  0,  0, 60], // 30% -- Rampe + 1 Coin
    top_arc_coins:         [ 0,  0,  0,  0,  0,  0,  0, 40], // 20% -- Rampe + 3 Coins
    ramp_oneup:            [ 0,  0,  0,  0,  0,  0,  0,  0]  // nicht random -- force-spawn alle 1000m auf Spaceship
  };

  function spawnForceFall(lvl){
    // Bei FORCE_FALL_DISTANCE auf einer Ebene: erzwinge Fall zur Ebene darunter.
    // Underground (Level 0): mandatory Lou-Rampe + danach Force-Gap.
    // Sonstige Ebenen: einfach Force-Gap (zu breit fuer LonG-Sprung).
    // Spawn-X wird hinter das rechteste Element auf der Ebene gesetzt --
    // verhindert dass Force-Gap mit gerade gespawntem Hindernis ueberlappt.
    const FORCE_GAP_W = 350;
    const last = rightmostEntityInfoForLevel(lvl);
    const safeX = Math.max(W + 20, (last.x === -Infinity ? W + 20 : last.x + 60));
    if(lvl === 0){
      ramps.push({ x: safeX, w: 130, level: 0, forced: true });
      gaps.push({ x: safeX + 130 + 100, w: FORCE_GAP_W, level: 0, forced: true });
    } else {
      gaps.push({ x: safeX, w: FORCE_GAP_W, level: lvl, forced: true });
    }
  }

  function spawnPattern(name, lvl){
    const pattern = PATTERNS[name];
    if(!pattern) return;
    let curX = W + 20;
    for(const op of pattern){
      curX += op.dx;
      const x = curX;
      // Level-Offset: Patterns koennen Elemente auf andere Etagen platzieren (z.B. Loch
      // auf Etage k+1 nach einer Rampe von k nach k+1).
      const targetLvl = lvl + (op.lvlOff || 0);
      if(targetLvl < 0 || targetLvl > MAX_LEVEL){
        // Ziel-Etage existiert nicht -> Op ueberspringen, aber curX trotzdem fortfuehren
        // mit Default-Breite, damit weitere Ops im Pattern ihren relativen Abstand behalten
        curX += op.w || 60;
        continue;
      }
      if(op.type === 'obstacle'){
        const kind = op.kind || 'low';
        let w, h;
        if(kind === 'tall'){ w = 26; h = 60 + Math.random()*20; }
        else { w = 24 + Math.random()*22; h = 28 + Math.random()*18; }
        obstacles.push({ x, w, h, type: kind, level: targetLvl });
        curX += w;
      } else if(op.type === 'gap'){
        const w = op.w || (80 + Math.random()*50);
        gaps.push({ x, w, level: targetLvl });
        curX += w;
      } else if(op.type === 'ramp'){
        const w = op.w || (110 + Math.random()*40);
        ramps.push({ x, w, level: targetLvl });
        curX += w;
      } else if(op.type === 'coin'){
        // Kind aus Ebene ableiten -- coin_chain Pattern erzwingt 'coin' (3er-Reihe ist immer Singles)
        let kind;
        if(name === 'coin_chain') kind = 'coin';
        else kind = pickMoneyKind(targetLvl);
        const c = { x, level: targetLvl, kind };
        if(op.dy != null) c.yOffset = op.dy; // optionale Hoehe ueber dem Boden (Standard: COIN_Y_OFFSET)
        coins.push(c);
        curX += COIN_RADIUS * 2;
      } else if(op.type === 'oneup'){
        const u = { x, level: targetLvl };
        if(op.dy != null) u.yOffset = op.dy; // optionale Schwebehoehe ueber dem Boden
        oneUps.push(u);
        curX += 32;
      }
    }
  }
  // Rechtester Eintrag (Position + Typ) auf einer bestimmten Etage.
  // Wird pro Etage benoetigt, weil jede Etage ihre eigene Spawn-Pipeline hat.
  function rightmostEntityInfoForLevel(lvl){
    let r = -Infinity;
    let type = null;
    for(const o of obstacles)  if(o.level === lvl  && o.x  + o.w  > r) { r = o.x + o.w; type = 'obstacle'; }
    for(const rp of ramps)     if(rp.level === lvl && rp.x + rp.w > r) { r = rp.x + rp.w; type = 'ramp'; }
    for(const g of gaps)       if(g.level === lvl  && g.x  + g.w  > r) { r = g.x + g.w; type = 'gap'; }
    for(const c of coins)      if(c.level === lvl  && c.x  + COIN_RADIUS > r) { r = c.x + COIN_RADIUS; type = 'coin'; }
    return { x: r, type };
  }

  // Pro Frame: jede Etage bekommt eine eigene Spawn-Roll.
  // Damit die anderen Etagen lebendig wirken (Player sieht hin, was kommt),
  // werden sie alle parallel mit ihren eigenen Etagen-Raten befuellt.
  function tickSpawns(distanceMeters){
    for(let lvl = 0; lvl <= MAX_LEVEL; lvl++){
      tickSpawnsForLevel(lvl, distanceMeters);
    }
  }
  function tickSpawnsForLevel(lvl, distanceMeters){
    const last = rightmostEntityInfoForLevel(lvl);
    const newSpawnX = W + 20;

    // Schedule-basierte Kandidaten: Typ ist "ueberfaellig" wenn Distanz >= scheduled
    const candidates = [];
    for(const type of ['coin', 'obstacle', 'gap', 'ramp']){
      if(distance >= nextSpawnDistance[type][lvl]){
        candidates.push({kind:'type', name:type});
      }
    }
    // Pattern-Rolls bleiben Bernoulli (= rare Highlight-Events)
    for(const pname in PATTERN_RATES){
      const r = PATTERN_RATES[pname][lvl];
      if(r <= 0) continue;
      // ramp_oneup auf Ebene 6 nur wenn Eligibility frei (1x pro Visit)
      // 1up-Patterns nicht mehr per Eligibility -- sie werden ueber Force-Spawn (alle 1000m) ausgeloest
      if(Math.random() < (r / 10000) * distanceMeters) candidates.push({kind:'pattern', name:pname});
    }
    if(candidates.length === 0) return;

    // Filter-Phase: Buffer-Check
    const allowed = [];
    for(const cand of candidates){
      let minGap;
      if(cand.kind === 'pattern'){
        minGap = 90;
      } else if(last.type && SPAWN_MIN_GAP[last.type] && SPAWN_MIN_GAP[last.type][cand.name] != null){
        minGap = SPAWN_MIN_GAP[last.type][cand.name];
      } else {
        minGap = SPAWN_BUFFER_DEFAULT;
      }
      if(last.x + minGap <= newSpawnX) allowed.push(cand);
    }
    if(allowed.length === 0) return;

    const chosen = allowed[Math.floor(Math.random() * allowed.length)];
    if(chosen.kind === 'pattern'){
      spawnPattern(chosen.name, lvl);
      // 1up-Pattern verbraucht die Eligibility -- erst bei naechstem MAX_LEVEL-Eintritt wieder frei
      // (kein eligibility-update mehr)
    } else {
      const fns = { coin: spawnCoin, obstacle: spawnObstacle, gap: spawnGap, ramp: spawnRamp };
      fns[chosen.name](lvl);
      // Schedule fuer diesen Typ neu setzen -- bounded jitter sorgt fuer regelmaessige Pacing
      nextSpawnDistance[chosen.name][lvl] = computeNextDist(chosen.name, lvl, distance, false);
    }
  }

  // ---------- particles ----------
  function puff(x,y,n,big){
    for(let i=0;i<n;i++){
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*(big?320:120),
        vy: (Math.random()-0.9)*(big?260:100),
        life: 0.4 + Math.random()*(big?0.6:0.3),
        age: 0,
        r: 1 + Math.random()*(big?3.5:2.2),
        c: big ? '#ff4d8d' : '#ffcc33'
      });
    }
  }

  // ---------- update / draw ----------

  // Sidescroll + Score laufen in PLAYING, SLIDING und FALLING -- so bleibt der Spielfluss erhalten
  function tickScrollingWorld(dt){
    timeAlive += dt;
    // Etagen-Basisspeed + Distanz-Rampe (2% pro 100m, gecappt bei +75% nach ~3750m)
    const baseSpeed = SPEEDS[Math.min(currentLevel, SPEEDS.length - 1)];
    const distanceMultiplier = 1 + Math.min(0.75, distance / 5000);
    const targetSpeed = baseSpeed * distanceMultiplier;
    speed += (targetSpeed - speed) * Math.min(1, dt * SPEED_LERP);
    const distanceThisFrameM = (speed * dt) / PIXELS_PER_METER;
    distance += distanceThisFrameM;
    document.getElementById('score').textContent = Math.floor(distance) + ' m';

    // Spawns pro Typ basierend auf Etagen-Raten (Poisson-artig)
    tickSpawns(distanceThisFrameM);

    // 1up-Force-Spawn alle 1000m -- levelabhaengig
    if(distance >= nextOneUpAtDistance && state === STATE.PLAYING){
      if(currentLevel === MAX_LEVEL){
        spawnPattern('ramp_oneup', currentLevel);
        nextOneUpAtDistance += 1000;
      } else if(currentLevel >= 3 && currentLevel <= MAX_LEVEL - 1){
        spawnPattern('gap_air_oneup', currentLevel);
        nextOneUpAtDistance += 1000;
      }
      // sonst: warten bis Player auf einer eligible Ebene ist
    }

    // Force-Fall bei 350m auf der aktuellen Ebene (verhindert "Kaffeefahrt" auf einer Ebene)
    if(!forceFallScheduled && (distance - levelEnterDistance) >= FORCE_FALL_DISTANCE && state === STATE.PLAYING){
      spawnForceFall(currentLevel);
      forceFallScheduled = true;
    }

    // Sidescroll: Hindernisse, Treppen, Luecken bewegen sich kontinuierlich
    for(let i=obstacles.length-1;i>=0;i--){
      const o = obstacles[i];
      o.x -= speed * dt;
      if(o.x + o.w < -10) obstacles.splice(i,1);
    }
    for(let i=ramps.length-1;i>=0;i--){
      const rp = ramps[i];
      rp.x -= speed * dt;
      // aktive Schraege NICHT despawnen, sonst bricht der laufende Slide ab
      if(rp.x + rp.w < -10 && rp !== activeRamp) ramps.splice(i,1);
    }
    for(let i=gaps.length-1;i>=0;i--){
      const g = gaps[i];
      g.x -= speed * dt;
      if(g.x + g.w < -10) gaps.splice(i,1);
    }
    for(let i=coins.length-1;i>=0;i--){
      const c = coins[i];
      c.x -= speed * dt;
      if(c.x + COIN_RADIUS < -10) coins.splice(i,1);
    }
    for(let i=oneUps.length-1;i>=0;i--){
      const u = oneUps[i];
      u.x -= speed * dt;
      if(u.x < -30) oneUps.splice(i,1);
    }

    // Hintergrund-Animation (laeuft nur bei aktivem Sidescroll)
    for(const s of stars) s.tw += dt*2.0;
    for(const c of clouds){
      c.x -= 30*c.s*dt;
      if(c.x + c.w < -20){ c.x = W + 20; c.y = 40 + Math.random()*(H*0.4); }
    }
  }

  function tickParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.age += dt;
      if(p.age >= p.life){ particles.splice(i,1); continue; }
      p.vy += GRAVITY*0.4*dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;
    }
    // Popups: floaten nach oben + faden aus
    for(let i=popups.length-1;i>=0;i--){
      const p = popups[i];
      p.age += dt;
      if(p.age >= p.life){ popups.splice(i,1); continue; }
      p.y -= 60 * dt;
    }
  }

  function update(dt){
    // ---------- SLIDING: Slide-Progress haengt an der Geometrie der Schraege ----------
    // Player-Mitte beginnt an der linken Kante (slideProgress=0) und endet
    // an der rechten Kante der Schraege (slideProgress=1). So matchen Player-Winkel
    // und Schraegen-Winkel automatisch -- unabhaengig von der Welt-Geschwindigkeit.
    if(state === STATE.SLIDING){
      tickScrollingWorld(dt);
      if(activeRamp){
        const pcx = player.x + player.w/2;
        slideProgress = Math.max(0, Math.min(1, (pcx - activeRamp.x) / activeRamp.w));
        if(slideProgress >= 1){
          slideProgress = 0;
          currentLevel++;
          state = STATE.PLAYING;
          // ausgenutzte Ramp freigeben + naechsten Frame normal despawnen lassen
          activeRamp = null;
          puff(player.x + player.w/2, player.y + player.h, 10);
          // Neue Ebene betreten: Force-Fall-Counter resetten
          levelEnterDistance = distance;
          forceFallScheduled = false;
        }
      } else {
        // Sicherheits-Fallback (sollte nicht passieren)
        slideProgress = 0;
        state = STATE.PLAYING;
      }
      tickParticles(dt);
      return;
    }

    // ---------- FALLING: durch Luecke, Sidescroll laeuft weiter ----------
    if(state === STATE.FALLING){
      if(currentLevel > 0){
        slideProgress -= dt / FALL_DURATION;
        if(slideProgress <= -1){
          slideProgress = 0;
          currentLevel--;
          state = STATE.PLAYING;
          puff(player.x + player.w/2, player.y + player.h, 8);
          // Neue Ebene betreten: Force-Fall-Counter resetten
          levelEnterDistance = distance;
          forceFallScheduled = false;
        }
        tickScrollingWorld(dt);
      } else {
        // Level 0: physikalischer Sturz aus dem Bild -> Game Over (Lives schuetzen hier nicht)
        // Bewusst harte Konsequenz wenn man durch den Boden faellt -- Sasch/LonG haetten geholfen.
        player.vy += GRAVITY * dt;
        player.y += player.vy * dt;
        if(player.y > H + 50){
          loseLifeOrGameOver();
        } else {
          tickScrollingWorld(dt);
        }
      }
      tickParticles(dt);
      return;
    }

    if(state !== STATE.PLAYING){
      // Menu/Over: nur dezente Hintergrund-Animation
      for(const s of stars) s.tw += dt*1.5;
      for(const c of clouds){ c.x -= 20*c.s*dt; if(c.x + c.w < -20) c.x = W + 20; }
      tickParticles(dt);
      return;
    }

    // ---------- PLAYING: volle Physik + Kollisionen ----------
    // Spieler-Physik (customGravity hat Vorrang -- gesetzt von LonGs Auto-Jump)
    const gNow = player.customGravity || GRAVITY;
    player.vy += gNow * dt;
    player.y  += player.vy * dt;
    const gy = groundY();
    if(player.y + player.h >= gy){
      player.y = gy - player.h;
      player.vy = 0;
      if(!player.onGround){
        puff(player.x + player.w/2, gy, 6);
      }
      player.onGround = true;
      player.jumpsUsed = 0;
      player.customGravity = null; // Override beim Landen aufheben
    } else {
      player.onGround = false;
    }
    player.runFrame += dt * (player.onGround ? 14 : 0);
    // Sprite-Time akkumuliert nur am Boden; in der Luft friert das Sprite ein
    if(player.onGround) player.spriteTime += dt;

    // Score, Spawn, Sidescroll, BG-Animation
    tickScrollingWorld(dt);

    // ---------- Luecken-Detection ----------
    // LonG: Auto-Jump bei Annaeherung (Lookahead, damit Sprung vor der Kante startet)
    // Andere: Spielermitte ueber Luecke -> Sturz
    if(player.onGround){
      if(activeCharacter === 'long'){
        const pRight = player.x + player.w;
        const pcx = player.x + player.w/2;
        for(const g of gaps){
          if(g.level !== currentLevel) continue;
          if(g.forced){
            // Force-Gap: erster Kontakt -> kurzer Hop, danach Fall einleiten
            if(g.longTried){
              // bereits versucht zu springen, nun fallen wenn Mitte ueber Loch
              if(pcx >= g.x && pcx <= g.x + g.w){
                state = STATE.FALLING;
                slideProgress = 0;
                player.onGround = false;
                player.vy = 60;
                puff(player.x + player.w/2, player.y + player.h, 5);
                break;
              }
              continue;
            }
            if(pRight + LONG_GAP_LOOKAHEAD >= g.x && pRight <= g.x + g.w){
              g.longTried = true;
              triggerLongJump(g);
              break;
            }
            continue;
          }
          // Normales Loch: Sprung triggern, sobald Rechtskante in Reichweite
          if(pRight + LONG_GAP_LOOKAHEAD >= g.x && pRight <= g.x + g.w){
            triggerLongJump(g);
            break;
          }
        }
      } else {
        const pcx = player.x + player.w/2;
        for(const g of gaps){
          if(g.level !== currentLevel) continue;
          if(pcx >= g.x && pcx <= g.x + g.w){
            state = STATE.FALLING;
            slideProgress = 0;
            player.onGround = false;
            player.vy = 60;
            puff(player.x + player.w/2, player.y + player.h, 5);
            break;
          }
        }
      }
    }

    // ---------- Schraegen-Kollision ----------
    // Nur Lou interagiert mit Schraegen. Andere ignorieren die Hitbox komplett.
    // Auf MAX_LEVEL (Ebene 6) gibt es keine hoehere Etage -> die Rampe wird zum
    // Boost-Pad und triggert einen Arc-Jump statt Slide.
    if(state === STATE.PLAYING && activeCharacter === 'lou'){
      for(const rp of ramps){
        if(rp.level !== currentLevel) continue;
        const ry0 = levelFloorY(rp.level + 1); // top
        const ry1 = levelFloorY(rp.level);     // bottom
        if(player.x < rp.x + rp.w && player.x + player.w > rp.x &&
           player.y < ry1 && player.y + player.h > ry0){
          if(currentLevel === MAX_LEVEL){
            triggerLouArcJump();
          } else {
            state = STATE.SLIDING;
            slideProgress = 0;
            activeRamp = rp;
            player.vy = 0;
            puff(player.x + player.w/2, groundY(), 8);
          }
          break;
        }
      }
    }

    // ---------- Hindernis-Kollision / Sasch-Zerstoerung ----------
    // Sasch zerstoert beruehrte Hindernisse (smash + Particle-Burst, dann weg
    // aus dem Array -- damit ein Wechsel mid-overlap zu Lou & Co. nicht
    // doch noch in eine "Geister"-Hitbox laeuft).
    // Alle anderen sterben bei Beruehrung -- es sei denn unverwundbar (nach Life-Loss).
    if(state === STATE.PLAYING){
      const px = player.x + 6, py = player.y + 4;
      const pw = player.w - 12, ph = player.h - 6;
      if(activeCharacter === 'sasch'){
        for(let i = obstacles.length - 1; i >= 0; i--){
          const o = obstacles[i];
          if(o.level !== currentLevel) continue;
          const oy = levelFloorY(o.level) - o.h;
          if(px < o.x + o.w && px + pw > o.x && py < oy + o.h && py + ph > oy){
            puff(o.x + o.w/2, oy + o.h/2, 14, true);
            obstacles.splice(i, 1);
          }
        }
      } else if(timeAlive >= invincibleUntil){
        for(const o of obstacles){
          if(o.level !== currentLevel) continue;
          const oy = levelFloorY(o.level) - o.h;
          if(px < o.x + o.w && px + pw > o.x && py < oy + o.h && py + ph > oy){
            loseLifeOrGameOver();
            break;
          }
        }
      }
    }

    // Hitbox = volles gerendertes Sprite (1.5x native Frame-Groesse), AABB-Test.
    // Mittelpunkt = c.x / cy, Halbweiten = sw/2, sh/2.

    // ---------- 1up-Pickup ----------
    // Nur Shizzo ist der Sammler -- 1ups verhalten sich wie Money-Items.
    if(state === STATE.PLAYING && activeCharacter === 'shizzo'){
      for(let i = oneUps.length - 1; i >= 0; i--){
        const u = oneUps[i];
        if(u.level !== currentLevel) continue;
        const uYOff = u.yOffset != null ? u.yOffset : 50;
        const uy = levelFloorY(u.level) - uYOff;
        const sw = ONEUP_SPRITE.frameW * ONEUP_SCALE;
        const sh = ONEUP_SPRITE.frameH * ONEUP_SCALE;
        // AABB: gerendertes Sprite vs Player-Box
        if(u.x + sw/2 > player.x && u.x - sw/2 < player.x + player.w &&
           uy + sh/2 > player.y && uy - sh/2 < player.y + player.h){
          if(lives < MAX_LIVES){
            lives++;
            updateLivesDisplay();
            popups.push({ x: u.x, y: uy - 10, text: '+1 LIFE', age: 0, life: 1.2 });
          } else {
            // Bereits Max -> Bonus in Coins umwandeln, damit's nicht "wertlos" wirkt
            coinsTotal += 100;
            try { localStorage.setItem('fmrun_coins', String(coinsTotal)); } catch(e){}
            document.getElementById('coinsValue').textContent = coinsTotal.toLocaleString('de-DE');
            popups.push({ x: u.x, y: uy - 10, text: '+100', age: 0, life: 1.0 });
          }
          puff(u.x, uy, 16, true);
          oneUps.splice(i, 1);
        }
      }
    }

    // ---------- Money-Pickup ----------
    // Nur Shizzo kann Money einsammeln. Bei anderen scrollen die Items einfach durch.
    // Wert + Sprite folgen aus c.kind (coin/stack/bag/case/pot).
    // Hitbox = volles gerendertes Sprite (1.5x native), AABB.
    if(state === STATE.PLAYING && activeCharacter === 'shizzo'){
      for(let i=coins.length-1;i>=0;i--){
        const c = coins[i];
        if(c.level !== currentLevel) continue;
        const yOff = c.yOffset != null ? c.yOffset : COIN_Y_OFFSET;
        const cy = levelFloorY(c.level) - yOff;
        const kind = c.kind || 'coin';
        const sa = SPRITE_BY_KIND[kind] || COIN_SPRITE_1;
        const sw = sa.frameW * COIN_SCALE;
        const sh = sa.frameH * COIN_SCALE;
        if(c.x + sw/2 > player.x && c.x - sw/2 < player.x + player.w &&
           cy + sh/2 > player.y && cy - sh/2 < player.y + player.h){
          const value = VALUE_BY_KIND[kind] || 0;
          coinsTotal += value;
          try { localStorage.setItem('fmrun_coins', String(coinsTotal)); } catch(e){}
          document.getElementById('coinsValue').textContent = coinsTotal.toLocaleString('de-DE');
          popups.push({ x: c.x, y: cy - 10, text: '+' + value, age: 0, life: 0.9 });
          coins.splice(i, 1);
        }
      }
    }

    tickParticles(dt);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // sky already via CSS gradient on canvas bg; draw stars
    for(const s of stars){
      const a = 0.4 + Math.sin(s.tw)*0.4;
      ctx.globalAlpha = Math.max(0,Math.min(1,a));
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // clouds (soft blobs)
    for(const c of clouds){
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w*0.6, c.w*0.22, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // Spieler-Bildschirm-Position (konstant -- fuer Etagen-Linien-Vergleich + Gap-Cut)
    const playerFloorScreenY = H * 0.65;

    // Pro Etage ein eigener Solid-Hintergrund, sodass die Ebenen optisch unterscheidbar sind.
    // Jeder Streifen reicht von der Decke (= Boden der naechsthoeheren Ebene) bis zum eigenen Boden.
    // Level 0 erstreckt sich zusaetzlich nach unten zur Bildschirmkante (Underground).
    // MAX_LEVEL (oberste Etage) bleibt transparent -> Sky bleibt sichtbar.
    const LEVEL_COLORS = [
      '#0d0a14', // Code Level 0 = Ebene -1 - underground (sehr dunkel)
      '#181410', // Code Level 1 = Ebene  0 - gutter (dunkel-braun)
      '#1a2348', // Code Level 2 = Ebene  1 - deep blue (Training Room)
      '#2a1840', // Code Level 3 = Ebene  2 - deep purple (Night Club)
      '#1a3a35', // Code Level 4 = Ebene  3 - deep teal (Battle Ground)
      '#3a1a28', // Code Level 5 = Ebene  4 - deep wine (TV Studio)
      '#3a2818', // Code Level 6 = Ebene  5 - deep amber (Theater Stage)
      null       // Code Level 7 = Ebene  6 - transparent (Sky, Spaceship)
    ];
    // Scroll-Offset in CSS-Pixeln (basis fuer alle Tile-Backgrounds)
    const scrollPx = distance * PIXELS_PER_METER;
    for(let lvl = 0; lvl <= MAX_LEVEL; lvl++){
      const color = LEVEL_COLORS[lvl];
      const bg = LEVEL_BGS[lvl];
      // Slab fuer Solid-Fill (auch hinter Tile, damit Underground-Bereich auf Level 0 gefuellt bleibt)
      const top    = (lvl < MAX_LEVEL) ? levelFloorY(lvl + 1) : -1;
      const bottom = (lvl === 0) ? H : levelFloorY(lvl);
      if(bottom > top){
        const drawTop    = Math.max(top, -1);
        const drawBottom = Math.min(bottom, H + 1);
        if(drawBottom > drawTop && color){
          ctx.fillStyle = color;
          ctx.fillRect(0, drawTop, W, drawBottom - drawTop);
        }
      }
      // Tile-Background: nur in der Etagen-Hoehe (von Decke = naechster Floor bis eigener Floor)
      if(bg && bg.complete && bg.naturalWidth > 0){
        const tileTop = (lvl < MAX_LEVEL) ? levelFloorY(lvl + 1) : (levelFloorY(lvl) - H * 0.28);
        const tileBot = levelFloorY(lvl);
        const tileScaledH = tileBot - tileTop;
        if(tileScaledH > 0){
          const tileScaledW = bg.naturalWidth * (tileScaledH / bg.naturalHeight);
          const offset = ((scrollPx % tileScaledW) + tileScaledW) % tileScaledW;
          let x = -offset;
          const iy = Math.round(tileTop);
          const ih = Math.ceil(tileScaledH);
          const iw = Math.ceil(tileScaledW);
          while(x < W){
            ctx.drawImage(bg, Math.round(x), iy, iw, ih);
            x += tileScaledW;
          }
        }
      }
    }

    // Etagen-Linien: alle Levels rendern
    //  - oberhalb Spieler: Slab + gelbe Akzentlinie (Etage in der Luft)
    //  - auf Spieler-Hoehe: starke gelbe Linie auf gefuelltem Boden
    //  - unterhalb (besuchte Etagen): schwache gelbe Linie im Boden
    for(let lvl = 0; lvl <= MAX_LEVEL; lvl++){
      const fy = levelFloorY(lvl);
      if(fy < -10 || fy > H + 10) continue;
      if(fy < playerFloorScreenY - 0.5){
        // Etage in der Luft
        const pgrad = ctx.createLinearGradient(0, fy, 0, fy + 6);
        pgrad.addColorStop(0, 'rgba(26,35,72,0.85)');
        pgrad.addColorStop(1, 'rgba(7,11,26,0.85)');
        ctx.fillStyle = pgrad;
        ctx.fillRect(0, fy, W, 6);
        ctx.strokeStyle = 'rgba(255,204,51,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, fy+0.5); ctx.lineTo(W, fy+0.5); ctx.stroke();
      } else if(fy > playerFloorScreenY + 0.5){
        // unterhalb des Spielers -- schwacher Marker
        ctx.strokeStyle = 'rgba(255,204,51,0.18)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, fy+0.5); ctx.lineTo(W, fy+0.5); ctx.stroke();
      } else {
        // exakt auf Spieler-Hoehe
        ctx.strokeStyle = 'rgba(255,204,51,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, fy+0.5); ctx.lineTo(W, fy+0.5); ctx.stroke();
      }
    }

    // Luecken: schmaler Strip in der Plattform-Linie der jeweiligen Etage.
    // Y-Position folgt levelFloorY(g.level) -- gilt fuer alle Etagen, sodass auch
    // hoehere/niedrigere Etagen sichtbar Loecher in ihrem Floor haben.
    for(const g of gaps){
      if(g.x + g.w < 0 || g.x > W) continue;
      const gy = levelFloorY(g.level);
      if(gy < -10 || gy > H + 10) continue;
      ctx.clearRect(g.x, gy - 2, g.w, 5);
    }

    // Treppen (Schraegen) -- Dreieck von Etage k bis Etage k+1
    for(const rp of ramps){
      const bottomY = levelFloorY(rp.level);
      const topY    = levelFloorY(rp.level + 1);
      if(bottomY < -50 || topY > H + 50) continue;
      const rgrad = ctx.createLinearGradient(rp.x, topY, rp.x + rp.w, bottomY);
      rgrad.addColorStop(0, '#ffd95c');
      rgrad.addColorStop(1, '#ff8a3d');
      ctx.fillStyle = rgrad;
      ctx.beginPath();
      ctx.moveTo(rp.x, bottomY);
      ctx.lineTo(rp.x + rp.w, topY);
      ctx.lineTo(rp.x + rp.w, bottomY);
      ctx.closePath();
      ctx.fill();
      // weisse Diagonal-Akzentlinie auf der Lauf-Seite
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rp.x, bottomY);
      ctx.lineTo(rp.x + rp.w, topY);
      ctx.stroke();
    }

    // Hindernisse -- y aus level abgeleitet, sodass sie mit der Welt mitfahren.
    // Pro Ebene optional ein Sprite (LEVEL_OBSTACLE_SPRITES); sonst procedural pink-gradient.
    for(const o of obstacles){
      const oy = levelFloorY(o.level) - o.h;
      if(oy < -200 || oy > H + 200) continue;
      const sprite = getLevelSpriteImage(LEVEL_OBSTACLE_SPRITES, o.level);
      if(sprite && sprite.complete && sprite.naturalWidth > 0){
        ctx.drawImage(sprite, Math.round(o.x), Math.round(oy), Math.ceil(o.w), Math.ceil(o.h));
      } else {
        const grd = ctx.createLinearGradient(o.x, oy, o.x, oy + o.h);
        grd.addColorStop(0,'#ff4d8d');
        grd.addColorStop(1,'#7a1240');
        ctx.fillStyle = grd;
        roundRect(ctx, o.x, oy, o.w, o.h, 4, true, false);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(o.x+3, oy+3, o.w-6, 3);
      }
    }

    // Money + 1up: pixel-perfekte 1px gruene Outline + intensiver Soft-Glow.
    // Trick: jeder Frame wird zuerst in einen offscreen-Canvas MIT PADDING gerendert,
    // dann mit shadow auf das Hauptcanvas gezeichnet. Dadurch kann der shadow-Gauss
    // frei in die Padding-Zone "bleeden" -- kein Clip mehr am Sprite-Frame.
    // Outline: 4 Schatten-Passes (oben/unten/links/rechts, blur=0, offset=1) auf dem
    // gepaddeden Canvas -> harte 1-Pixel gruene Kontur an der echten Sprite-Silhouette.
    // Glow-Layer: 2 Schatten-Passes (blur 24 + blur 10) auf dem gepaddeden Canvas.
    const MONEY_GLOW_COLOR = '#8cf0aa';
    const GLOW_PAD = 32; // genug Platz fuer Outer-Blur 24 + 1px Outline
    function ensureSpritePad(sprite){
      if(!sprite._padCanvas){
        sprite._padCanvas = document.createElement('canvas');
        sprite._padCtx = sprite._padCanvas.getContext('2d');
        sprite._padCtx.imageSmoothingEnabled = false;
      }
      const sw = sprite.frameW, sh = sprite.frameH;
      const tw = sw + GLOW_PAD*2, th = sh + GLOW_PAD*2;
      if(sprite._padCanvas.width !== tw || sprite._padCanvas.height !== th){
        sprite._padCanvas.width = tw;
        sprite._padCanvas.height = th;
        sprite._padCtx.imageSmoothingEnabled = false;
      }
    }
    function drawWithGreenGlow(sprite, time, dx, dy, dw, dh){
      if(!sprite.ready) return;
      ensureSpritePad(sprite);
      const sw = sprite.frameW, sh = sprite.frameH;
      const idx = sprite.frameAt(time, true);
      const pad = sprite._padCanvas;
      const pCtx = sprite._padCtx;
      // 1) Aktuellen Frame in padded offscreen rendern (transparenter Rand drumherum)
      pCtx.clearRect(0, 0, pad.width, pad.height);
      pCtx.drawImage(sprite.img, idx*sw, 0, sw, sh, GLOW_PAD, GLOW_PAD, sw, sh);
      // Destination im Spielfeld: gepaddete Canvas mit Skala = dw/sw (sollte = COIN_SCALE sein)
      const scaleX = dw / sw, scaleY = dh / sh;
      const destW = pad.width  * scaleX;
      const destH = pad.height * scaleY;
      const destX = Math.round(dx - GLOW_PAD * scaleX);
      const destY = Math.round(dy - GLOW_PAD * scaleY);
      const dW = Math.round(destW), dH = Math.round(destH);
      // 2) Soft-Glow Pass 1 (weiter Halo)
      ctx.shadowColor = MONEY_GLOW_COLOR;
      ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      ctx.shadowBlur = 24;
      ctx.drawImage(pad, destX, destY, dW, dH);
      // 3) Soft-Glow Pass 2 (tighter, intensiver)
      ctx.shadowBlur = 10;
      ctx.drawImage(pad, destX, destY, dW, dH);
      // 4) Pixel-perfekte 1px Outline -- 4 Richtungs-Shadows, blur=0
      ctx.shadowBlur = 0;
      const OUT = Math.max(1, Math.round(scaleX)); // 1.5x -> 2px im Display
      const dirs = [[-OUT,0],[OUT,0],[0,-OUT],[0,OUT]];
      for(const [ox, oy] of dirs){
        ctx.shadowOffsetX = ox;
        ctx.shadowOffsetY = oy;
        ctx.drawImage(pad, destX, destY, dW, dH);
      }
      // Reset
      ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0;
    }

    // 1ups -- animiertes Sprite (1.5x), schwebt hoch in der Luft (Default 50px ueber Boden,
    // im ramp_oneup Pattern aber 228px ueber dem Top-Floor -- nur via Boost-Rampe erreichbar)
    for(const u of oneUps){
      if(u.x < -30 || u.x > W + 30) continue;
      const uYOff = u.yOffset != null ? u.yOffset : 50;
      const uy = levelFloorY(u.level) - uYOff;
      if(uy < -30 || uy > H + 30) continue;
      const sw = ONEUP_SPRITE.frameW * ONEUP_SCALE;
      const sh = ONEUP_SPRITE.frameH * ONEUP_SCALE;
      if(ONEUP_SPRITE.ready){
        drawWithGreenGlow(ONEUP_SPRITE, timeAlive, u.x - sw/2, uy - sh/2, sw, sh);
      } else {
        ctx.fillStyle = '#ff4d8d';
        ctx.beginPath(); ctx.arc(u.x, uy, 14, 0, Math.PI*2); ctx.fill();
      }
    }

    // Money-Items (Coin / Stack / Bag / Case / Pot) -- animierte Sprites, 1.5x gerendert.
    // c.kind bestimmt Sprite + Wert (siehe SPRITE_BY_KIND / VALUE_BY_KIND).
    // Werden auf allen Etagen gerendert (Lebendigkeit), interagieren aber nur mit dem Spieler
    // wenn er auf der gleichen Etage UND als Shizzo unterwegs ist.
    const coinPulse = Math.sin(timeAlive * 6);
    for(const c of coins){
      const yOff = c.yOffset != null ? c.yOffset : COIN_Y_OFFSET;
      const cy = levelFloorY(c.level) - yOff + coinPulse * 1.5;
      if(cy < -30 || cy > H + 30) continue;
      const kind = c.kind || 'coin';
      const sa = SPRITE_BY_KIND[kind] || COIN_SPRITE_1;
      if(sa.ready){
        const sw = sa.frameW * COIN_SCALE;
        const sh = sa.frameH * COIN_SCALE;
        drawWithGreenGlow(sa, timeAlive, c.x - sw/2, cy - sh/2, sw, sh);
      } else {
        // Procedural Fallback: Goldkreis mit Highlight
        ctx.fillStyle = '#cc8a00';
        ctx.beginPath(); ctx.arc(c.x, cy, COIN_RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffcc33';
        ctx.beginPath(); ctx.arc(c.x, cy, COIN_RADIUS - 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath(); ctx.arc(c.x - 3, cy - 3, COIN_RADIUS * 0.35, 0, Math.PI*2); ctx.fill();
      }
    }

    // player
    // Spieler -- 2-stufiges Life-Loss Feedback:
    //   1) Waehrend Hit-Pause (~400ms): 5x sichtbar/unsichtbar Blink (real-time)
    //   2) Danach Standard-Flicker fuer 1.5s Invincibility (game-time)
    const nowMs = performance.now();
    if(nowMs < hitPauseRealUntil){
      // 5 Blink-Zyklen ueber 400ms -> 10 Phasen a 40ms
      const elapsed = nowMs - hitFlashRealStart;
      const phase = Math.floor(elapsed / 40) % 2;
      ctx.globalAlpha = phase === 0 ? 1 : 0.0;
    } else if(timeAlive < invincibleUntil){
      ctx.globalAlpha = 0.35 + 0.65 * Math.abs(Math.sin(timeAlive * 22));
    }
    drawPlayer(player);
    ctx.globalAlpha = 1;

    // Screen-Flash Overlay (rot, pulsiert 5x, fadet aus). Real-Time, laeuft auch waehrend Hit-Pause.
    if(nowMs < hitFlashRealUntil){
      const total = hitFlashRealUntil - hitFlashRealStart;
      const t = (nowMs - hitFlashRealStart) / total;        // 0..1
      const fade = 1 - t;                                    // linear fade
      const pulse = Math.abs(Math.sin(t * Math.PI * 5));     // 5 Peaks
      const opacity = fade * pulse * 0.55;
      ctx.fillStyle = `rgba(255, 70, 90, ${opacity})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Coin-Pickup-Popups ("+1", "+25", ...) -- floaten nach oben, faden aus
    ctx.font = '12px "Press Start 2P", ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for(const p of popups){
      const a = 1 - p.age / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = '#ffcc33';
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.globalAlpha = 1;

    // particles
    for(const p of particles){
      const a = 1 - p.age/p.life;
      ctx.globalAlpha = Math.max(0,a);
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer(p){
    const char = CHARACTERS[activeCharacter] || CHARACTERS.lou;
    const useSprite = char.sprite && char.sprite.ready;
    // bei Sprite kein zusaetzlicher Y-Bob -- die Animation hat eigene Vertikal-Bewegung
    const bob = (useSprite || !p.onGround) ? 0 : Math.sin(p.runFrame)*2;
    const x = p.x, y = p.y + bob;

    // shadow -- skaliert mit absoluter Distanz vom Boden, verschwindet komplett im Sturz
    const sy = groundY()+2;
    const dist = Math.abs(sy - (p.y + p.h));
    const sw = p.w * (p.onGround ? 1 : Math.max(0, 1 - dist/200));
    if(sw > 0.5){
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(x + p.w/2, sy, sw*0.5, 4, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // -------- Sprite-Pfad (nur fuer Helden mit hinterlegtem Sprite, z.B. Lou) --------
    if(useSprite){
      // Sprite-Groesse 1.5x source (128 -> 192). Pixel-Perfect bleibt durch
      // Nearest-Neighbor + Integer-Snapping in SpriteAnim.draw().
      const targetH = 192;
      const targetW = 192;
      const dx = (x + p.w/2) - targetW/2;
      const dy = (y + p.h) - targetH; // Fuesse an der Player-Unterkante ausrichten
      char.sprite.draw(ctx, p.spriteTime, dx, dy, targetW, targetH, p.onGround);
      return;
    }

    // -------- Fallback: bisheriges Body-Rect mit Initial / Name --------
    const bodyGrad = ctx.createLinearGradient(x,y,x,y+p.h);
    bodyGrad.addColorStop(0, char.body);
    bodyGrad.addColorStop(1, char.dark);
    ctx.fillStyle = bodyGrad;
    roundRect(ctx, x, y, p.w, p.h, 8, true, false);

    const name = char.name;
    // Press Start 2P ist breiter -> kleinere Sizes als beim System-Font
    const fontSize = name.length <= 3 ? 12 : name.length <= 4 ? 10 : 8;
    ctx.fillStyle = '#1a1a1a';
    ctx.font = `${fontSize}px "Press Start 2P", ui-monospace, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, x + p.w/2, y + p.h/2 + 1);

    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x+4, y+8, p.w-8, 4);

    if(p.onGround){
      const phase = Math.sin(p.runFrame);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + 6,  y + p.h, 8, 6 + phase*2);
      ctx.fillRect(x + p.w - 14, y + p.h, 8, 6 - phase*2);
    } else {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + 8,  y + p.h, 8, 6);
      ctx.fillRect(x + p.w - 16, y + p.h, 8, 6);
    }
  }

  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    if(w<2*r) r=w/2; if(h<2*r) r=h/2;
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  // ---------- main loop ----------
  function frame(t){
    if(!lastT) lastT = t;
    let dt = (t - lastT)/1000;
    lastT = t;
    if(dt > 0.05) dt = 0.05; // clamp big stalls
    // Pause oder Hit-Pause: update einfrieren, draw laeuft weiter (Hit-Flash bleibt sichtbar)
    if(!paused && !isHitPaused()) update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  // initial seed for the menu screen
  reset();
  state = STATE.READY;
  // place player on ground for the menu
  player.y = groundY() - player.h;
  // ein zweiter Resize nach dem ersten Layout (Bottom-Nav-Hoehe wird erst dann gemessen)
  requestAnimationFrame(() => {
    resize();
    player.y = groundY() - player.h;
    seedStars(); seedClouds();
    requestAnimationFrame(frame);
  });
})();
</script>
</body>
</html>
